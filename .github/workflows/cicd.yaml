name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: pytest

    - name: Train Model
      run: python -m src.models.train

    - name: Build Docker Image
      run: docker build -t cats-dogs-api:latest .

    - name: Log into Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Tag Image
      run: docker tag cats-dogs-api:latest ${{ secrets.DOCKER_USERNAME }}/cats-dogs-api:latest

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/cats-dogs-api:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull Latest Image
        run: docker pull gowthampotluri/cats-dogs-api:latest

      - name: Deploy
        run: |
          docker rm -f cats-dogs-api || true
          docker compose up -d

      - name: Smoke Tests
        run: |
          echo "Waiting for API to be ready"
          pip install requests
          for i in {1..10}; do
            if curl -s http://localhost:8080/health; then
              echo " - API is up!"
              break
            fi
            echo "API not ready yet, retrying..."
            sleep 6
          done
          python checks/smoke/deployment_check.py

      - name: Performance Tracking
        run: |
          echo "Fetching performance metrics"
          curl -s -X GET http://localhost:8080/performance | jq

      - name: Monitoring
        run: |
          echo "Fetching performance metrics"
          curl -s -X GET http://localhost:8080/metrics | jq

      - name: Logging
        run: |
          docker compose logs cats-dogs-api
          mkdir -p logs
          docker cp cats-dogs-api:/app/logs/app.log logs/app.log || echo "No log file found"

      - name: Upload logs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: logs/app.log

      - name: Stop container
        run: docker compose down
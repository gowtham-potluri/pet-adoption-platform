name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # - name: Configure GDrive credentials
    #   run: |
    #     echo '${{ secrets.GDRIVE_CREDENTIALS }}' > gdrive-creds.json
    #     dvc remote modify gdrive gdrive_use_service_account true
    #     dvc remote modify gdrive gdrive_service_account_json_file_path gdrive-creds.json

    # - name: Pull data
    #   run: dvc pull --no-run-cache

    - name: Run Tests
      run: pytest

    - name: Train model
      run: python -m src.models.train

    - name: Build Docker Image
      run: docker build -t cats-dogs-api:latest .

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Tag Image
      run: docker tag cats-dogs-api:latest ${{ secrets.DOCKER_USERNAME }}/cats-dogs-api:latest

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/cats-dogs-api:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull latest image
        run: docker pull gowthampotluri/cats-dogs-api:latest

      - name: Stop old container
        run: docker rm -f cats-dogs-api || true

      - name: Deploy container
        run: docker compose up -d

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/health; then
              echo "API is up!"
              break
            fi
            echo "API not ready yet, retrying..."
            sleep 6
          done

      - name: Run smoke tests
        run: python tests/smoke/deployment_check.py

      - name: Stop container
        run: docker compose down